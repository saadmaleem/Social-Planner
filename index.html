<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ContentVault — Social Media Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent-fb: #4f7fff;
    --accent-li: #00b4a0;
    --accent-dash: #ff6b6b;
    --accent-set: #c084fc;
    --text: #f0f0f5;
    --muted: #7878a0;
    --success: #4ade80;
    --warning: #fbbf24;
    --radius: 14px;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --card-bg: #16161d;
    --input-bg: #0e0e12;
  }
  [data-theme="light"] {
    --bg: #f4f4f8;
    --surface: #ffffff;
    --surface2: #eeeef5;
    --border: #dddde8;
    --text: #0e0e1a;
    --muted: #6868a0;
    --card-bg: #ffffff;
    --input-bg: #f4f4f8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding-bottom: 80px; /* Safe padding space for the mobile bottom nav */
    transition: background 0.3s, color 0.3s;
  }

  /* ── NAVIGATION (DESKTOP BAR BY DEFAULT) ── */
  nav {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 24px;
    height: 62px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 1.15rem;
    letter-spacing: -0.03em;
    margin-right: auto;
    color: var(--text);
  }
  .logo span { color: var(--accent-fb); }
  .tab-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    border-radius: 40px;
    border: 1.5px solid transparent;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface2); }
  .tab-btn.active { color: var(--text); background: var(--surface2); border-color: var(--border); }
  .tab-btn.active[data-tab="facebook"] { border-color: var(--accent-fb); color: var(--accent-fb); }
  .tab-btn.active[data-tab="linkedin"] { border-color: var(--accent-li); color: var(--accent-li); }
  .tab-btn.active[data-tab="dashboard"] { border-color: var(--accent-dash); color: var(--accent-dash); }
  .tab-btn.active[data-tab="settings"] { border-color: var(--accent-set); color: var(--accent-set); }
  .tab-icon { font-size: 1.1rem; }

  /* ── MOBILE HEADER (ONLY VISIBLE ON PHONE LAYOUTS) ── */
  .mobile-header {
    display: none;
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
    padding: 0 16px;
    position: sticky;
    top: 0;
    z-index: 99;
  }

  /* ── PANELS & LAYOUTS ── */
  .panel { display: none; padding: 20px 16px; max-width: 1200px; margin: 0 auto; }
  .panel.active { display: block; }
  
  .platform-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
  }
  .platform-title {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.02em;
  }
  .add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 40px;
    border: none;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .add-btn-fb { background: var(--accent-fb); color: #fff; }
  .add-btn-li { background: var(--accent-li); color: #fff; }

  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 6px;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
